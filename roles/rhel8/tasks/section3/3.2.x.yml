---
- name: 3.2.1 | Ensure atm kernel module is not available
  when:
    - rhel8cis_rule_3_2_1_enabled
  become: true
  block:
    - name: 3.2.1 | Ensure atm kernel module is not available | Prevent modprobe install
      ansible.builtin.lineinfile:
        path: /etc/modprobe.d/atm.conf
        regexp: "^(#)?install atm"
        line: install atm /bin/false
        create: true
        owner: root
        group: root
        mode: '0600'

    - name: 3.2.1 | Ensure atm kernel module is not available | Add modprobe blacklist
      ansible.builtin.lineinfile:
        path: /etc/modprobe.d/atm.conf
        regexp: "^(#)?blacklist atm(\\s|$)"
        line: blacklist atm
        create: true
        owner: root
        group: root
        mode: '0600'

    - name: 3.2.1 | Ensure atm kernel module is not available | Disable module
      community.general.modprobe:
        name: atm
        state: absent

