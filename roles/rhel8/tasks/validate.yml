---
- name: Gather distribution info
  when:
    - ansible_distribution is not defined or
      ansible_distribution_major_version is not defined or
      ansible_os_family is not defined
  ansible.builtin.setup:
    gather_subset:
      - '!all'
      - '!min'
      - distribution
      - distribution_major_version
      - os_family

- name: Get package facts
  ansible.builtin.package_facts:

- name: Validate OS version and family
  ansible.builtin.assert:
    that:
      - ansible_os_family == 'RedHat' or ansible_os_family == 'Rocky'
      - ansible_distribution_major_version is version_compare('8', '==')
    fail_msg: >-
      This role can only be run against supported Linux distributions.
      {{ ansible_distribution }} {{ ansible_distribution_major_version }} is not supported.
    success_msg: >-
      This role is running against {{ ansible_distribution }} {{ ansible_distribution_major_version }}.

- name: Validate | 1.1.2.1.2 | Ensure nodev option set on /tmp partition
  when:
    - rhel8cis_rule_1_1_2_1_2_enabled
  ansible.builtin.assert:
    that:
      - '"nodev" in rhel8cis_tmp_mount_opts'
    fail_msg: >-
      The variable 'rhel8cis_tmp_mount_opts' must contain 'nodev'. Value: {{ rhel8cis_tmp_mount_opts | join(', ') }}
    success_msg: >-
      The variable 'rhel8cis_tmp_mount_opts' contains 'nodev'. Value: {{ rhel8cis_tmp_mount_opts | join(', ') }}

