  ansible.builtin.assert:
    that:
      - rhel8cis_crypto_policy != 'LEGACY'
    fail_msg: "The 'rhel8cis_crypto_policy' cannot be 'LEGACY'. Value: {{ rhel8cis_crypto_policy }}"
    success_msg: "The 'rhel8cis_crypto_policy' is not set to 'LEGACY'. Value: {{ rhel8cis_crypto_policy }}"

