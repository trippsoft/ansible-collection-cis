- name: Validate | 5.1.20 | Ensure sshd MaxStartups is configured
  when:
    - rhel8cis_rule_5_1_20_enabled
  block:
    - name: Validate | 5.1.20 | Ensure sshd MaxStartups is configured | Validate startups before dropping
      ansible.builtin.assert:
        that:
          - rhel8cis_sshd_max_startups_before_dropping | int > 0
          - rhel8cis_sshd_max_startups_before_dropping | int <= 10
        fail_msg: >-
          The 'rhel8cis_sshd_max_startups_before_dropping' variable must be set to between 1 and 10.
          Value: {{ rhel8cis_sshd_max_startups_before_dropping }}
        success_msg: >-
          The 'rhel8cis_sshd_max_startups_before_dropping' variable is set to between 1 and 10.
          Value: {{ rhel8cis_sshd_max_startups_before_dropping }}

    - name: Validate | 5.1.20 | Ensure sshd MaxStartups is configured | Validate startup drop percentage
      ansible.builtin.assert:
        that:
          - rhel8cis_sshd_max_startups_drop_percentage | int <= 30
          - rhel8cis_sshd_max_startups_drop_percentage | int >= 0
        fail_msg: >-
          The 'rhel8cis_sshd_max_startups_drop_percentage' variable must be set to between 0 and 30.
          Value: {{ rhel8cis_sshd_max_startups_drop_percentage }}
        success_msg: >-
          The 'rhel8cis_sshd_max_startups_drop_percentage' variable is set to between 0 and 30.
          Value: {{ rhel8cis_sshd_max_startups_drop_percentage }}

    - name: Validate | 5.1.20 | Ensure sshd MaxStartups is configured | Validate startup absolute maximum
      ansible.builtin.assert:
        that:
          - rhel8cis_sshd_max_startups_absolute_maximum | int >= rhel8cis_sshd_max_startups_before_dropping | int
          - rhel8cis_sshd_max_startups_absolute_maximum | int <= 60
        fail_msg: >-
          The 'rhel8cis_sshd_max_startups_absolute_maximum' variable must be set to between the value of
          'rhel8cis_sshd_max_startups_before_dropping' ({{ rhel8cis_sshd_max_startups_before_dropping }}) and 60.
          Value: {{ rhel8cis_sshd_max_startups_absolute_maximum }}
        success_msg: >-
          The 'rhel8cis_sshd_max_startups_absolute_maximum' variable is set to between the value of
          'rhel8cis_sshd_max_startups_before_dropping' ({{ rhel8cis_sshd_max_startups_before_dropping }}) and 60.
          Value: {{ rhel8cis_sshd_max_startups_absolute_maximum }}

