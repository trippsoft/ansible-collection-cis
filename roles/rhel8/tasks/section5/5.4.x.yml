---
- name: 5.4.1.1 | Ensure password expiration is configured
  when:
    - rhel8cis_rule_5_4_1_1_enabled
  become: true
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^#?\s?PASS_MAX_DAYS'
    line: "PASS_MAX_DAYS {{ rhel8cis_password_expiration_days }}"

- name: 5.4.1.2 | Ensure minimum password days is configured
  when:
    - rhel8cis_rule_5_4_1_2_enabled
    - rhel8cis_rule_5_4_1_2_force or _rhel8cis_level2
  become: true
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^#?\s?PASS_MIN_DAYS'
    line: "PASS_MIN_DAYS {{ rhel8cis_password_minimum_days }}"

- name: 5.4.1.3 | Ensure password expiration warning days is configured
  when:
    - rhel8cis_rule_5_4_1_3_enabled
  become: true
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^#?\s?PASS_WARN_AGE'
    line: "PASS_WARN_AGE {{ rhel8cis_password_expiration_warning_days }}"

- name: 5.4.1.4 | Ensure strong password hashing algorithm is configured
  loop:
    - path: /etc/libuser.conf
      regexp: '^#?\s?crypt_style ='
      line: "crypt_style = {{ rhel8cis_password_encryption_algorithm | lower }}"
    - path: /etc/login.defs
      regexp: '^#?\s?ENCRYPT_METHOD'
      line: "ENCRYPT_METHOD {{ rhel8cis_password_encryption_algorithm }}"
  when:
    - rhel8cis_rule_5_4_1_4_enabled
  become: true
  ansible.builtin.lineinfile:
    path: "{{ item.path }}"
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"

- name: 5.4.1.5 | Ensure inactive password lock is configured
  when:
    - rhel8cis_rule_5_4_1_5_enabled
  become: true
  ansible.builtin.lineinfile:
    path: /etc/default/useradd
    regexp: '^INACTIVE'
    line: 'INACTIVE={{ rhel8cis_inactive_password_lock_days }}'

- name: 5.4.1.6 | Ensure all users last password change date is in the past
  when:
    - rhel8cis_rule_5_4_1_6_enabled
  become: true
  block:
    - name: 5.4.1.6 | Ensure all users last password change date is in the past | Get current date/time
      check_mode: false
      ansible.builtin.shell: echo $(($(date --utc --date "$1" +%s)/86400))
      changed_when: false
      failed_when: false
      register: _rhel8cis_current_date_time

    - name: 5.4.1.6 | Ensure all users last password change date is in the past | Get users with future password date # noqa risky-shell-pipe
      check_mode: false
      ansible.builtin.shell: |
        cat /etc/shadow | awk -F: '{if($3>{{ _rhel8cis_current_date_time.stdout }})print$1}'
      changed_when: false
      failed_when: false
      register: _rhel8cis_future_password_users

    - name: 5.4.1.6 | Ensure all users last password change date is in the past | Warn
      when:
        - _rhel8cis_future_password_users.stdout_lines | length > 0
      ansible.builtin.include_tasks: ../add-warning.yml
      vars:
        _rhel8cis_warning_rule: '5.4.1.6'
        _rhel8cis_warning_description: >-
          {{ _rhel8cis_future_password_users.stdout_lines | join(",") }} have invalid password dates.

- name: 5.4.2.1 | Ensure root is the only UID 0 account
  when:
    - rhel8cis_rule_5_4_2_1_enabled
  block:
    - name: 5.4.2.1 | Ensure root is the only UID 0 account | Get passwd info
      ansible.builtin.getent:
        database: passwd
      register: _rhel8cis_getent_passwd

    - name: 5.4.2.1 | Ensure root is the only UID 0 account | Convert to structured dict
      ansible.builtin.set_fact:
        _rhel8cis_passwd: >-
          {{ _rhel8cis_getent_passwd.ansible_facts.getent_passwd |
              dict2items |
              community.general.json_query('[].{key: key, value: {
                  username: key,
                  password: value[0],
                  uid: value[1],
                  gid: value[2],
                  gecos: value[3],
                  home: value[4],
                  shell: value[5]
              }}') |
              items2dict(key_name='key', value_name='value') }}

    - name: 5.4.2.1 | Ensure root is the only UID 0 account | Filter for UID 0 accounts
      ansible.builtin.set_fact:
        _rhel8cis_uid_0_accounts: >-
          {{ _rhel8cis_passwd |
              dict2items |
              map(attribute='value') |
              selectattr('uid', 'equalto', '0') |
              map(attribute='username') |
              list }}

    - name: 5.4.2.1 | Ensure root is the only UID 0 account | Warn
      when:
        - _rhel8cis_uid_0_accounts | length > 1 or
          (_rhel8cis_uid_0_accounts | length == 1 and 'root' not in _rhel8cis_uid_0_accounts)
      ansible.builtin.include_tasks: ../add-warning.yml
      vars:
        _rhel8cis_warning_rule: '5.4.2.1'
        _rhel8cis_warning_description: >-
          The following accounts have UID 0: {{ _rhel8cis_uid_0_accounts | join(",") }}. Only root should have UID 0.

- name: 5.4.2.2 | Ensure root is the only GID 0 account
  when:
    - rhel8cis_rule_5_4_2_2_enabled
  become: true
  block:
    - name: 5.4.2.2 | Ensure root is the only GID 0 account | Get passwd info
      ansible.builtin.getent:
        database: passwd
      register: _rhel8cis_getent_passwd

    - name: 5.4.2.2 | Ensure root is the only GID 0 account | Convert to structured dict
      ansible.builtin.set_fact:
        _rhel8cis_passwd: >-
          {{ _rhel8cis_getent_passwd.ansible_facts.getent_passwd |
              dict2items |
              community.general.json_query('[].{key: key, value: {
                  username: key,
                  password: value[0],
                  uid: value[1],
                  gid: value[2],
                  gecos: value[3],
                  home: value[4],
                  shell: value[5]
              }}') |
              items2dict(key_name='key', value_name='value') }}

    - name: 5.4.2.2 | Ensure root is the only GID 0 account | Filter for GID 0 accounts
      ansible.builtin.set_fact:
        _rhel8cis_gid_0_accounts: >-
          {{ _rhel8cis_passwd |
              dict2items |
              map(attribute='value') |
              selectattr('gid', 'equalto', '0') |
              map(attribute='username') |
              list }}

    - name: 5.4.2.2 | Ensure root is the only GID 0 account | Warn
      when:
        - _rhel8cis_gid_0_accounts | length > 1 or
          (_rhel8cis_gid_0_accounts | length == 1 and 'root' not in _rhel8cis_gid_0_accounts)
      ansible.builtin.include_tasks: ../add-warning.yml
      vars:
        _rhel8cis_warning_rule: '5.4.2.2'
        _rhel8cis_warning_description: >-
          The following accounts have GID 0: {{ _rhel8cis_gid_0_accounts | join(",") }}. Only root should have GID 0.

- name: 5.4.2.3 | Ensure group root is the only GID 0 group
  when:
    - rhel8cis_rule_5_4_2_3_enabled
  block:
    - name: 5.4.2.3 | Ensure group root is the only GID 0 group | Get group info
      ansible.builtin.getent:
        database: group
      register: _rhel8cis_getent_group

    - name: 5.4.2.3 | Ensure group root is the only GID 0 group | Convert to structured dict
      ansible.builtin.set_fact:
        _rhel8cis_group: >-
          {{ _rhel8cis_getent_group.ansible_facts.getent_group |
              dict2items |
              community.general.json_query('[].{key: key, value: {
                  groupname: key,
                  password: value[0],
                  gid: value[1],
                  members: value[2]
              }}') |
              items2dict(key_name='key', value_name='value') }}

    - name: 5.4.2.3 | Ensure group root is the only GID 0 group | Filter for GID 0 groups
      ansible.builtin.set_fact:
        _rhel8cis_gid_0_groups: >-
          {{ _rhel8cis_group |
              dict2items |
              map(attribute='value') |
              selectattr('gid', 'equalto', '0') |
              map(attribute='groupname') |
              list }}

    - name: 5.4.2.3 | Ensure group root is the only GID 0 group | Warn
      when:
        - _rhel8cis_gid_0_groups | length > 1 or
          (_rhel8cis_gid_0_groups | length == 1 and 'root' not in _rhel8cis_gid_0_groups)
      ansible.builtin.include_tasks: ../add-warning.yml
      vars:
        _rhel8cis_warning_rule: '5.4.2.3'
        _rhel8cis_warning_description: >-
          The following groups have GID 0: {{ _rhel8cis_gid_0_groups | join(",") }}. Only root should have GID 0.

- name: 5.4.2.4 | Ensure root account access is controlled
  when:
    - rhel8cis_rule_5_4_2_4_enabled
  ansible.builtin.include_tasks: ../add-warning.yml
  vars:
    _rhel8cis_warning_rule: '5.4.2.4'
    _rhel8cis_warning_description: The root password will not be set by this role. Please set or lock it manually.

- name: 5.4.2.5 | Ensure root path integrity
  when:
    - rhel8cis_rule_5_4_2_5_enabled
  ansible.builtin.include_tasks: ../add-warning.yml
  vars:
    _rhel8cis_warning_rule: '5.4.2.5'
    _rhel8cis_warning_description: The root PATH variable should be set to a secure value.

- name: 5.4.2.6 | Ensure root user umask is configured
  when:
    - rhel8cis_rule_5_4_2_6_enabled
  become: true
  ansible.builtin.lineinfile:
    path: /root/.bash_profile
    regexp: '^#?\s?umask'
    line: 'umask 0027'

- name: 5.4.2.7 | Ensure system accounts do not have a valid login shell
  when:
    - rhel8cis_rule_5_4_2_7_enabled
  block:
    - name: 5.4.2.7 | Ensure system accounts do not have a valid login shell | Get passwd info
      ansible.builtin.getent:
        database: passwd
      register: _rhel8cis_getent_passwd

    - name: 5.4.2.7 | Ensure system accounts do not have a valid login shell | Convert to structured dict
      ansible.builtin.set_fact:
        _rhel8cis_passwd: >-
          {{ _rhel8cis_getent_passwd.ansible_facts.getent_passwd |
              dict2items |
              community.general.json_query('[].{key: key, value: {
                  username: key,
                  password: value[0],
                  uid: value[1],
                  gid: value[2],
                  gecos: value[3],
                  home: value[4],
                  shell: value[5]
              }}') |
              items2dict(key_name='key', value_name='value') }}

    - name: 5.4.2.7 | Ensure system accounts do not have a valid login shell | Set shell to nologin
      loop: "{{ _rhel8cis_passwd | dict2items | map(attribute='value') }}"
      loop_control:
        label: "{{ item.username }}"
      when:
        - item.username != "halt"
        - item.username != "shutdown"
        - item.username != "sync"
        - item.username != "root"
        - item.username != "nfsnobody"
        - item.username != "pipewire"
        - item.uid | int < 1000
        - item.shell != "/bin/false"
        - item.shell != "/sbin/nologin"
      become: true
      ansible.builtin.user:
        name: "{{ item.username }}"
        shell: /usr/sbin/nologin

- name: 5.4.2.8 | Ensure accounts without a valid login shell are locked
  when:
    - rhel8cis_rule_5_4_2_8_enabled
  block:
    - name: 5.4.2.8 | Ensure accounts without a valid login shell are locked | Get passwd info
      ansible.builtin.getent:
        database: passwd
      register: _rhel8cis_getent_passwd

    - name: 5.4.2.8 | Ensure accounts without a valid login shell are locked | Convert to structured dict
      ansible.builtin.set_fact:
        _rhel8cis_passwd: >-
          {{ _rhel8cis_getent_passwd.ansible_facts.getent_passwd |
              dict2items |
              community.general.json_query('[].{key: key, value: {
                  username: key,
                  password: value[0],
                  uid: value[1],
                  gid: value[2],
                  gecos: value[3],
                  home: value[4],
                  shell: value[5]
              }}') |
              items2dict(key_name='key', value_name='value') }}

    - name: 5.4.2.8 | Ensure accounts without a valid login shell are locked | Lock accounts without valid login shell
      loop: "{{ _rhel8cis_passwd | dict2items | map(attribute='value') | list }}"
      loop_control:
        label: "{{ item.username }}"
      when:
        - item.username != "halt"
        - item.username != "shutdown"
        - item.username != "sync"
        - item.username != "root"
        - item.username != "nfsnobody"
        - item.username != "pipewire"
        - item.username != "pulse"
        - item.username != "gnome-initial-setup"
        - item.username != "avahi"
        - item.shell == "/bin/false" or
          item.shell == "/sbin/nologin" or
          item.shell == "/usr/sbin/nologin"
      become: true
      ansible.builtin.user:
        name: "{{ item.username }}"
        password: "*"
        password_lock: true

- name: 5.4.3.1 | Ensure nologin is not listed in /etc/shells
  when:
    - rhel8cis_rule_5_4_3_1_enabled
    - rhel8cis_rule_5_4_3_1_force or _rhel8cis_level2
  become: true
  ansible.builtin.lineinfile:
    path: /etc/shells
    regexp: '/nologin\b'
    state: absent

- name: 5.4.3.2 | Ensure default user shell timeout is configured
  when:
    - rhel8cis_rule_5_4_3_2_enabled
  become: true
  ansible.builtin.lineinfile:
    path: /etc/profile.d/timeout.sh
    create: true
    line: 'TMOUT={{ rhel8cis_default_user_shell_timeout_seconds }}'
    owner: root
    group: root
    mode: '0755'

- name: 5.4.3.3 | Ensure default user umask is configured
  when:
    - rhel8cis_rule_5_4_3_3_enabled
  become: true
  ansible.builtin.lineinfile:
    path: /etc/profile.d/umask.sh
    create: true
    line: 'umask 0027'
    owner: root
    group: root
    mode: '0755'
