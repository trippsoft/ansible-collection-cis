---
argument_specs:
  main:
    short_description: RHEL 8 CIS Benchmarks
    description:
      - This role applies the CIS Benchmark hardening steps on RHEL8-based machines.  It is based on the CIS Benchmark for RHEL 8, v3.0.0.
    author: Jim Tarpley (@trippsc2)
    options:
      rhel8cis_skip_reboot:
        type: bool
        required: false
        default: true
        description:
          - Whether to skip the reboot step.
      rhel8cis_level:
        type: int
        required: false
        default: 2
        choices:
          - 1
          - 2
        description:
          - The CIS benchmark level to apply.
      rhel8cis_machine_type:
        type: str
        required: false
        default: server
        choices:
          - server
          - workstation
        description:
          - The type of machine for which to apply the CIS benchmarks.
      rhel8cis_rule_1_1_1_1_enabled:
        type: bool
        required: false
        default: true
        description:
          - Whether to apply CIS rule 1.1.1.1.
          - This applies when the level and machine type are appropriate.
      rhel8cis_rule_1_1_1_2_enabled:
        type: bool
        required: false
        default: true
        description:
          - Whether to apply CIS rule 1.1.1.2.
          - This applies when the level and machine type are appropriate.
      rhel8cis_rule_1_1_1_3_enabled:
        type: bool
        required: false
        default: true
        description:
          - Whether to apply CIS rule 1.1.1.3.
          - This applies when the level and machine type are appropriate.
      rhel8cis_rule_1_1_1_4_enabled:
        type: bool
        required: false
        default: true
        description:
          - Whether to apply CIS rule 1.1.1.4.
          - This applies when the level and machine type are appropriate.
      rhel8cis_rule_1_1_1_5_enabled:
        type: bool
        required: false
        default: true
        description:
          - Whether to apply CIS rule 1.1.1.5.
          - This applies when the level and machine type are appropriate.
      rhel8cis_rule_1_1_1_6_enabled:
        type: bool
        required: false
        default: true
        description:
          - Whether to apply CIS rule 1.1.1.6.
          - This applies when the level and machine type are appropriate.
      rhel8cis_rule_1_1_1_6_force:
        type: bool
        required: false
        default: false
        description:
          - Whether to override the level requirement for CIS rule 1.1.1.6.
          - This applies when the machine type is appropriate.
      rhel8cis_rule_1_1_1_7_enabled:
        type: bool
        required: false
        default: true
        description:
          - Whether to apply CIS rule 1.1.1.7.
          - This applies when the level and machine type are appropriate.
      rhel8cis_rule_1_1_1_7_force:
        type: bool
        required: false
        default: false
        description:
          - Whether to override the level requirement for CIS rule 1.1.1.7.
          - This applies when the machine type is appropriate.
      rhel8cis_rule_1_1_1_8_enabled:
        type: bool
        required: false
        default: true
        description:
          - Whether to apply CIS rule 1.1.1.8.
          - This applies when the level and machine type are appropriate.
      rhel8cis_rule_1_1_1_8_force:
