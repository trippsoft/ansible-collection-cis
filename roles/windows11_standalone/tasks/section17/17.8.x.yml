---
- name: "17.8.1 | L1 | Ensure 'Audit Sensitive Privilege Use' is set to 'Success'"
  when:
    - w11cis_rule_17_8_1_enabled
  block:
    - name: "17.8.1 | L1 | Ensure 'Audit Sensitive Privilege Use' is set to 'Success' | Get status"
      check_mode: false
      ansible.windows.win_shell: >-
        AuditPol /get /subcategory:"{0cce9228-69ae-11d9-bed3-505054503030}" -r |
          ConvertFrom-Csv |
          Select-Object -expand "Inclusion Setting"
      changed_when: false
      failed_when: false
      register: _w11cis_rule_17_8_1_audit

    - name: "17.8.1 | L1 | Ensure 'Audit Sensitive Privilege Use' is set to 'Success' | Success"
      when:
        - ("Success" not in _w11cis_rule_17_8_1_audit.stdout)
      ansible.windows.win_shell: AuditPol /set /subcategory:"{0cce9228-69ae-11d9-bed3-505054503030}" /success:enable
      changed_when: true
