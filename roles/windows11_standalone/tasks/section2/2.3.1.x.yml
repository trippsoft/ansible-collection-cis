---
- name: "2.3.1.1 | L1 | Ensure 'Accounts: Guest account status' is set to 'Disabled'"
  when:
    - w11cis_rule_2_3_1_1_enabled
  community.windows.win_security_policy:
    section: System Access
    key: EnableGuestAccount
    value: 0

- name: >-
    2.3.1.2 | L1 |
    Ensure 'Accounts: Limit local account use of blank passwords to console logon only' is set to 'Enabled'
  when:
    - w11cis_rule_2_3_1_2_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa
    name: LimitBlankPasswordUse
    data: 1
    type: dword
    state: present

- name: "2.3.1.3 | L1 | Configure 'Accounts: Rename administrator account'"
  when:
    - w11cis_rule_2_3_1_3_enabled
  community.windows.win_security_policy:
    section: System Access
    key: NewAdministratorName
    value: "{{ w11cis_admin_username }}"

- name: "2.3.1.4 | L1 | Configure 'Accounts: Rename guest account'"
  when:
    - w11cis_rule_2_3_1_4_enabled
  community.windows.win_security_policy:
    section: System Access
    key: NewGuestName
    value: "{{ w11cis_guest_username }}"
