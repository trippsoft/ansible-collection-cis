---
- name: "18.9.53.1.1 | L1 | Ensure 'Enable Windows NTP Client' is set to 'Enabled'"
  when:
    - w11cis_rule_18_9_53_1_1_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\W32Time\TimeProviders\NtpClient
    name: Enabled
    data: 1
    type: dword
    state: present
