---
- name: >-
    18.9.49.5.1 | L2 |
    Ensure 'Microsoft Support Diagnostic Tool: Turn on MSDT interactive communication with support provider'
    is set to 'Disabled'
  when:
    - w11cis_rule_18_9_49_5_1_enabled
    - w11cis_rule_18_9_49_5_1_force or _w11cis_level2
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\ScriptedDiagnosticsProvider\Policy
    name: DisableQueryRemoteServer
    data: 0
    type: dword
    state: present

- name: "18.9.49.11.1 | L2 | Ensure 'Enable/Disable PerfTrack' is set to 'Disabled'"
  when:
    - w11cis_rule_18_9_49_11_1_enabled
    - w11cis_rule_18_9_49_11_1_force or _w11cis_level2
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\WDI\{9c5a40da-b965-4fc3-8781-88dd50a6299d}
    name: ScenarioExecutionEnabled
    data: 0
    type: dword
    state: present
