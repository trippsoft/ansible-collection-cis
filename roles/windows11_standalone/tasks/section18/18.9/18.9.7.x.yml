---
- name: >-
    18.9.7.1.1 | BL |
    Ensure 'Prevent installation of devices using drivers that match these device setup classes' is set to 'Enabled'
  when:
    - w11cis_rule_18_9_7_1_1_enabled
    - w11cis_rule_18_9_7_1_1_force or w11cis_bitlocker
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\DeviceInstall\Restrictions
    name: DenyDeviceClasses
    data: 1
    type: dword
    state: present

- name: >-
    18.9.7.1.2 | BL |
    Ensure 'Prevent installation of devices using drivers that match these device setup classes: Prevent installation of
    devices using drivers for these device setup' is set to 'IEEE 1394 device setup classes'
  when:
    - w11cis_rule_18_9_7_1_2_enabled
    - w11cis_rule_18_9_7_1_2_force or w11cis_bitlocker
  ansible.builtin.debug:
    msg: >-
      CIS rule 18.9.7.1.2 requires manual configuration.
      Please set 'Prevent installation of devices using drivers that match these device setup classes: Prevent
      installation of devices using drivers for these device setup'
      to 'IEEE 1394 device setup classes' in the Local Group Policy Editor (gpedit.msc) under
      Computer Configuration > Administrative Templates > System > Device Installation > Device Installation
      Restrictions.

- name: >-
    18.9.7.1.3 | BL |
    Ensure 'Prevent installation of devices using drivers that match these device setup classes: Also apply to matching
    devices that are already installed.' is set to 'True'
  when:
    - w11cis_rule_18_9_7_1_3_enabled
    - w11cis_rule_18_9_7_1_3_force or w11cis_bitlocker
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\DeviceInstall\Restrictions
    name: DenyDeviceClassesRetroactive
    data: 1
    type: dword
    state: present

- name: >-
    18.9.7.2 | L1 |
    Ensure 'Prevent automatic download of applications associated with device metadata' is set to 'Enabled'
  when:
    - w11cis_rule_18_9_7_2_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Device Metadata
    name: PreventDeviceMetadataFromNetwork
    data: 1
    type: dword
    state: present
