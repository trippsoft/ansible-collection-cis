---
- name: "18.9.20.1.1 | L1 | Ensure 'Turn off access to the Store' is set to 'Enabled'"
  when:
    - w11cis_rule_18_9_20_1_1_enabled
    - w11cis_rule_18_9_20_1_1_force or _w11cis_level2
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Explorer
    name: NoUseStoreOpenWith
    data: 1
    type: dword
    state: present

- name: "18.9.20.1.2 | L1 | Ensure 'Turn off downloading of print drivers over HTTP' is set to 'Enabled'"
  when:
    - w11cis_rule_18_9_20_1_2_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Printers
    name: DisableWebPnPDownload
    data: 1
    type: dword
    state: present

- name: "18.9.20.1.3 | L2 | Ensure 'Turn off handwriting personalization data sharing' is set to 'Enabled'"
  when:
    - w11cis_rule_18_9_20_1_3_enabled
    - w11cis_rule_18_9_20_1_3_force or _w11cis_level2
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\TabletPC
    name: PreventHandwritingDataSharing
    data: 1
    type: dword
    state: present

- name: "18.9.20.1.4 | L2 | Ensure 'Turn off handwriting recognition error reporting' is set to 'Enabled'"
  when:
    - w11cis_rule_18_9_20_1_4_enabled
    - w11cis_rule_18_9_20_1_4_force or _w11cis_level2
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\HandwritingErrorReports
    name: PreventHandwritingErrorReports
    data: 1
    type: dword
    state: present

- name: >-
    18.9.20.1.5 | L2 |
    Ensure 'Turn off Internet Connection Wizard if URL connection is referring to Microsoft.com' is set to 'Enabled'
  when:
    - w11cis_rule_18_9_20_1_5_enabled
    - w11cis_rule_18_9_20_1_5_force or _w11cis_level2
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Internet Connection Wizard
    name: ExitOnMSICW
    data: 1
    type: dword
    state: present

- name: >-
    18.9.20.1.6 | L1 |
    Ensure 'Turn off Internet download for Web publishing and online ordering wizards' is set to 'Enabled'
  when:
    - w11cis_rule_18_9_20_1_6_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer
    name: NoWebServices
    data: 1
    type: dword
    state: present

- name: "18.9.20.1.7 | L2 | Ensure 'Turn off printing over HTTP' is set to 'Enabled'"
  when:
    - w11cis_rule_18_9_20_1_7_enabled
    - w11cis_rule_18_9_20_1_7_force or _w11cis_level2
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Printers
    name: DisableHTTPPrinting
    data: 1
    type: dword
    state: present

- name: >-
    18.9.20.1.8 | L2 |
    Ensure 'Turn off Registration if URL connection is referring to Microsoft.com' is set to 'Enabled'
  when:
    - w11cis_rule_18_9_20_1_8_enabled
    - w11cis_rule_18_9_20_1_8_force or _w11cis_level2
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Registration Wizard Control
    name: NoRegistration
    data: 1
    type: dword
    state: present

- name: "18.9.20.1.9 | L2 | Ensure 'Turn off Search Companion content file updates' is set to 'Enabled'"
  when:
    - w11cis_rule_18_9_20_1_9_enabled
    - w11cis_rule_18_9_20_1_9_force or _w11cis_level2
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\SearchCompanion
    name: DisableContentFileUpdates
    data: 1
    type: dword
    state: present

- name: "18.9.20.1.10 | L2 | Ensure 'Turn off the \"Order Prints\" picture task' is set to 'Enabled'"
  when:
    - w11cis_rule_18_9_20_1_10_enabled
    - w11cis_rule_18_9_20_1_10_force or _w11cis_level2
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer
    name: NoOnlinePrintsWizard
    data: 1
    type: dword
    state: present

- name: "18.9.20.1.11 | L2 | Ensure 'Turn off the \"Publish to Web\" task for files and folders' is set to 'Enabled'"
  when:
    - w11cis_rule_18_9_20_1_11_enabled
    - w11cis_rule_18_9_20_1_11_force or _w11cis_level2
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer
    name: NoPublishingWizard
    data: 1
    type: dword
    state: present

- name: >-
    18.9.20.1.12 | L2 |
    Ensure 'Turn off the Windows Messenger Customer Experience Improvement Program' is set to 'Enabled'
  when:
    - w11cis_rule_18_9_20_1_12_enabled
    - w11cis_rule_18_9_20_1_12_force or _w11cis_level2
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Messenger\Client
    name: CEIP
    data: 2
    type: dword
    state: present

- name: "18.9.20.1.13 | L2 | Ensure 'Turn off Windows Customer Experience Improvement Program' is set to 'Enabled'"
  when:
    - w11cis_rule_18_9_20_1_13_enabled
    - w11cis_rule_18_9_20_1_13_force or _w11cis_level2
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\SQMClient\Windows
    name: CEIPEnable
    data: 0
    type: dword
    state: present

- name: "18.9.20.1.14 | L2 | Ensure 'Turn off Windows Error Reporting' is set to 'Enabled'"
  when:
    - w11cis_rule_18_9_20_1_14_enabled
    - w11cis_rule_18_9_20_1_14_force or _w11cis_level2
  block:
    - name: >-
        18.9.20.1.14 | L2 | Ensure 'Turn off Windows Error Reporting' is set to 'Enabled' | Windows Error Reporting
      ansible.windows.win_regedit:
        path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Windows Error Reporting
        name: Disabled
        data: 1
        type: dword
        state: present

    - name: "18.9.20.1.14 | L2 | Ensure 'Turn off Windows Error Reporting' is set to 'Enabled' | ErrorReporting"
      ansible.windows.win_regedit:
        path: HKLM:\SOFTWARE\Policies\Microsoft\PCHealth\ErrorReporting
        name: DoReport
        data: 0
        type: dword
        state: present
