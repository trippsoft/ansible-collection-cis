---
- name: "18.11.1 | L1 | Ensure 'Disable HTTP proxy features: Disable WPAD' is set to 'Enabled: Checked'"
  when:
    - w11cis_rule_18_11_1_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Internet Settings\WinHttp
    name: DisableWpad
    data: 1
    type: dword
    state: present

- name: >-
    18.11.2 | L1 |
    Ensure 'Disable HTTP proxy features: Disable proxy authentication'
    is set to 'Enabled: Disable authentication over loopback interfaces' or higher
  when:
    - w11cis_rule_18_11_2_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Internet Settings
    name: DisableProxyAuthenticationSchemes
    data: "{{ _w11cis_disable_http_proxy_features_value }}"
    type: dword
    state: present
