---
- name: "18.10.82.1 | L1 | Ensure 'Allow user control over installs' is set to 'Disabled'"
  when:
    - w11cis_rule_18_10_82_1_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Installer
    name: EnableUserControl
    data: 0
    type: dword
    state: present

- name: "18.10.82.2 | L1 | Ensure 'Always install with elevated privileges' is set to 'Disabled'"
  when:
    - w11cis_rule_18_10_82_2_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Installer
    name: AlwaysInstallElevated
    data: 0
    type: dword
    state: present

- name: >-
    18.10.82.3 | L2 |
    Ensure 'Prevent Internet Explorer security prompt for Windows Installer scripts' is set to 'Disabled'
  when:
    - w11cis_rule_18_10_82_3_enabled
    - w11cis_rule_18_10_82_3_force or _w11cis_level2
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Installer
    name: SafeForScripting
    data: 0
    type: dword
    state: present
