---
- name: "18.10.3.1 | L2 | Ensure 'Turn off API Sampling' is set to 'Enabled'"
  when:
    - w11cis_rule_18_10_3_1_enabled
    - w11cis_rule_18_10_3_1_force or _w11cis_level2
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\AppCompat
    name: DisableAPISamping
    data: 1
    type: dword
    state: present

- name: "18.10.3.2 | L2 | Ensure 'Turn off Application Footprint' is set to 'Enabled'"
  when:
    - w11cis_rule_18_10_3_2_enabled
    - w11cis_rule_18_10_3_2_force or _w11cis_level2
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\AppCompat
    name: DisableApplicationFootprint
    data: 1
    type: dword
    state: present

- name: "18.10.3.3 | L2 | Ensure 'Turn off Install Tracing' is set to 'Enabled'"
  when:
    - w11cis_rule_18_10_3_3_enabled
    - w11cis_rule_18_10_3_3_force or _w11cis_level2
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\AppCompat
    name: DisableInstallTracing
    data: 1
    type: dword
    state: present
