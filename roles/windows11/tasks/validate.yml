---
- name: Gather distribution info
  when:
    - ansible_distribution is not defined or
      ansible_os_family is not defined or
      ansible_windows_domain_role is not defined
  ansible.builtin.setup:
    gather_subset:
      - '!all'
      - '!min'
      - distribution
      - os_family
      - windows_domain

- name: Run PowerShell to check if Hyper-V is installed.
  ansible.windows.win_powershell:
    script: |
      $Ansible.Changed = $false

      try {
        $feature = Get-WindowsOptionalFeature -Online -FeatureName Microsoft-Hyper-V-All
        $Ansible.Result = $feature.State -eq 'Enabled'
      } catch {
        $Ansible.Result = $false
      }
  register: _w11cis_hyperv_installed

- name: Set the Hyper-V variable
  ansible.builtin.set_fact:
    _w11cis_hyperv: "{{ _w11cis_hyperv_installed.result }}"

- name: Check OS version and family
  ansible.builtin.assert:
    that:
      - ansible_os_family == 'Windows'
      - '"Microsoft Windows 11" in ansible_distribution'
    fail_msg: >-
      This role can only be run against Windows 11.
      {{ ansible_distribution }} {{ ansible_distribution_major_version }} is not supported.
    success_msg: "This role is running against {{ ansible_distribution }} {{ ansible_distribution_major_version }}."

- name: "Validate | 1.1.1 | L1 | Ensure 'Enforce password history' is set to '24 or more password(s)'"
  when:
    - w11cis_rule_1_1_1_enabled
  ansible.builtin.assert:
    that:
      - w11cis_password_history_size | int >= 24
    fail_msg: >-
      The variable 'w11cis_password_history_size' must be set to 24 or more.
      Value: {{ w11cis_password_history_size }}
    success_msg: >-
      The variable 'w11cis_password_history_size' is set to 24 or more. Value: {{ w11cis_password_history_size }}

