---
- name: "18.10.80.1 | L1 | Ensure 'Enable ESS with Supported Peripherals' is set to 'Enabled: 1'"
  when:
    - w11cis_rule_18_10_80_1_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Policies\PassportForWork\Biometrics
    name: EnableESSwithSupportedPeripherals
    data: 1
    type: dword
    state: present
