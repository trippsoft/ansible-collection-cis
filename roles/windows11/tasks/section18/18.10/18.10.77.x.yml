---
- name: "18.10.77.1.1 | L1 | Ensure 'Automatic Data Collection' is set to 'Enabled'"
  when:
    - w11cis_rule_18_10_77_1_1_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\WTDS\Components
    name: CaptureThreatWindow
    data: 1
    type: dword
    state: present

- name: "18.10.77.1.2 | L1 | Ensure 'Notify Malicious' is set to 'Enabled'"
  when:
    - w11cis_rule_18_10_77_1_2_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\WTDS\Components
    name: NotifyMalicious
    data: 1
    type: dword
    state: present

- name: "18.10.77.1.3 | L1 | Ensure 'Notify Password Reuse' is set to 'Enabled'"
  when:
    - w11cis_rule_18_10_77_1_3_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\WTDS\Components
    name: NotifyPasswordReuse
    data: 1
    type: dword
    state: present

- name: "18.10.77.1.4 | L1 | Ensure 'Notify Unsafe App' is set to 'Enabled'"
  when:
    - w11cis_rule_18_10_77_1_4_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\WTDS\Components
    name: NotifyUnsafeApp
    data: 1
    type: dword
    state: present

- name: "18.10.77.1.5 | L1 | Ensure 'Service Enabled' is set to 'Enabled'"
  when:
    - w11cis_rule_18_10_77_1_5_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\WTDS\Components
    name: ServiceEnabled
    data: 1
    type: dword
    state: present

- name: >-
    18.10.77.2.1 | L1 | Ensure 'Configure Windows Defender SmartScreen' is set to 'Enabled: Warn and prevent bypass'
  when:
    - w11cis_rule_18_10_77_2_1_enabled
  block:
    - name: >-
        18.10.77.2.1 | L1 |
        Ensure 'Configure Windows Defender SmartScreen' is set to 'Enabled: Warn and prevent bypass' |
        EnableSmartScreen
      ansible.windows.win_regedit:
        path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\System
        name: EnableSmartScreen
        data: 1
        type: dword
        state: present

    - name: >-
        18.10.77.2.1 | L1 |
        Ensure 'Configure Windows Defender SmartScreen' is set to 'Enabled: Warn and prevent bypass' |
        ShellSmartScreenLevel
      ansible.windows.win_regedit:
        path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\System
        name: ShellSmartScreenLevel
        data: Block
        type: string
        state: present
