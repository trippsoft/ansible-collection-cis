---
- name: >-
    18.10.94.1.1 | L1 |
    Ensure 'No auto-restart with logged on users for scheduled automatic updates installations' is set to 'Disabled'
  when:
    - w11cis_rule_18_10_94_1_1_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU
    name: NoAutoRebootWithLoggedOnUsers
    data: 0
    type: dword
    state: present

- name: "18.10.94.2.1 | L1 | Ensure 'Configure Automatic Updates' is set to 'Enabled'"
  when:
    - w11cis_rule_18_10_94_2_1_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU
    name: NoAutoUpdate
    data: 0
    type: dword
    state: present

- name: "18.10.94.2.2 | L1 | Ensure 'Configure Automatic Updates: Scheduled install day' is set to '0 - Every day'"
  when:
    - w11cis_rule_18_10_94_2_2_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU
    name: ScheduledInstallDay
    data: 0
    type: dword
    state: present

- name: >-
    18.10.94.2.3 | L1 | Ensure 'Enable features introduced via servicing that are off by default' is set to 'Disabled'
  when:
    - w11cis_rule_18_10_94_2_3_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate
    name: AllowTemporaryEnterpriseFeatureControl
    data: 0
    type: dword
    state: present

- name: "18.10.94.2.4 | L1 | Ensure 'Remove access to “Pause updates” feature' is set to 'Enabled'"
  when:
    - w11cis_rule_18_10_94_2_4_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate
    name: SetDisablePauseUXAccess
    data: 1
    type: dword
    state: present

- name: "18.10.94.4.1 | L1 | Ensure 'Manage preview builds' is set to 'Disabled'"
  when:
    - w11cis_rule_18_10_94_4_1_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate
    name: ManagePreviewBuildsPolicyValue
    data: 1
    type: dword
    state: present

- name: "18.10.94.4.2 | L1 | Ensure 'Select when Quality Updates are received' is set to 'Enabled: 0 days'"
  when:
    - w11cis_rule_18_10_94_4_2_enabled
  block:
    - name: >-
        18.10.94.4.2 | L1 |
        Ensure 'Select when Quality Updates are received' is set to 'Enabled: 0 days' |
        DeferQualityUpdates
      ansible.windows.win_regedit:
        path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate
        name: DeferQualityUpdates
        data: 1
        type: dword
        state: present

    - name: >-
        18.10.94.4.2 | L1 |
        Ensure 'Select when Quality Updates are received' is set to 'Enabled: 0 days' |
        DeferQualityUpdatesPeriodInDays
      ansible.windows.win_regedit:
        path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate
        name: DeferQualityUpdatesPeriodInDays
        data: 0
        type: dword
        state: present

- name: "18.10.94.4.3 | L1 | Ensure 'Enable optional updates' is set to 'Disabled'"
  when:
    - w11cis_rule_18_10_94_4_3_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate
    name: SetAllowOptionalContent
    data: 0
    type: dword
    state: present
