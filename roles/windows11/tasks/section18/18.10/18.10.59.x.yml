---
- name: "18.10.59.2 | L2 | Ensure 'Allow Cloud Search' is set to 'Enabled: Disable Cloud Search'"
  when:
    - w11cis_rule_18_10_59_2_enabled
    - w11cis_rule_18_10_59_2_force or _w11cis_level2
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Windows Search
    name: AllowCloudSearch
    data: 0
    type: dword
    state: present

- name: "18.10.59.3 | L1 | Ensure 'Allow Cortana' is set to 'Disabled'"
  when:
    - w11cis_rule_18_10_59_3_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Windows Search
    name: AllowCortana
    data: 0
    type: dword
    state: present

- name: "18.10.59.4 | L1 | Ensure 'Allow Cortana above lock screen' is set to 'Disabled'"
  when:
    - w11cis_rule_18_10_59_4_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Windows Search
    name: AllowCortanaAboveLock
    data: 0
    type: dword
    state: present

- name: "18.10.59.5 | L1 | Ensure 'Allow indexing of encrypted files' is set to 'Disabled'"
  when:
    - w11cis_rule_18_10_59_5_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Windows Search
    name: AllowIndexingEncryptedStoresOrItems
    data: 0
    type: dword
    state: present

- name: "18.10.59.6 | L1 | Ensure 'Allow search and Cortana to use location' is set to 'Disabled'"
  when:
    - w11cis_rule_18_10_59_6_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Windows Search
    name: AllowSearchToUseLocation
    data: 0
    type: dword
    state: present

- name: "18.10.59.7 | L2 | Ensure 'Allow search highlights' is set to 'Disabled'"
  when:
    - w11cis_rule_18_10_59_7_enabled
    - w11cis_rule_18_10_59_7_force or _w11cis_level2
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Windows Search
    name: EnableDynamicContentInWSB
    data: 0
    type: dword
    state: present
