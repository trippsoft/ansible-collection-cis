---
- name: "18.10.72.1 | L2 | Ensure 'Allow widgets' is set to 'Disabled'"
  when:
    - w11cis_rule_18_10_72_1_enabled
    - w11cis_rule_18_10_72_1_force or _w11cis_level2
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Dsh
    name: AllowNewsAndInterests
    data: 0
    type: dword
    state: present
