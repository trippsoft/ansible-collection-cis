---
- name: "18.10.15.1 | L1 | Ensure 'Do not display the password reveal button' is set to 'Enabled'"
  when:
    - w11cis_rule_18_10_15_1_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\CredUI
    name: DisablePasswordReveal
    data: 1
    type: dword
    state: present

- name: "18.10.15.2 | L1 | Ensure 'Enumerate administrator accounts on elevation' is set to 'Disabled'"
  when:
    - w11cis_rule_18_10_15_2_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\CredUI
    name: EnumerateAdministrators
    data: 0
    type: dword
    state: present

- name: "18.10.15.3 | L1 | Ensure 'Prevent the use of security questions for local accounts' is set to 'Enabled'"
  when:
    - w11cis_rule_18_10_15_3_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\System
    name: NoLocalPasswordResetQuestions
    data: 1
    type: dword
    state: present
