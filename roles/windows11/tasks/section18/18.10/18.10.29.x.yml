---
- name: >-
    18.10.29.2 | L2 |
    Ensure 'Turn off account-based insights, recent, favorite, and recommended files in File Explorer'
    is set to 'Enabled'
  when:
    - w11cis_rule_18_10_29_2_enabled
    - w11cis_rule_18_10_29_2_force or _w11cis_level2
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Explorer
    name: DisableGraphRecentItems
    data: 1
    type: dword
    state: present

- name: "18.10.29.3 | L1 | Ensure 'Turn off Data Execution Prevention for Explorer' is set to 'Disabled'"
  when:
    - w11cis_rule_18_10_29_3_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Explorer
    name: NoDataExecutionPrevention
    data: 0
    type: dword
    state: present

- name: >-
    18.10.29.4 | L1 |
    Ensure 'Do not apply the Mark of the Web tag to files copied from insecure sources' is set to 'Disabled'
  when:
    - w11cis_rule_18_10_29_4_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Explorer
    name: DisableMotWOnInsecurePathCopy
    data: 0
    type: dword
    state: present

- name: "18.10.29.5 | L1 | Ensure 'Turn off heap termination on corruption' is set to 'Disabled'"
  when:
    - w11cis_rule_18_10_29_5_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Explorer
    name: NoHeapTerminationOnCorruption
    data: 0
    type: dword
    state: present

- name: "18.10.29.6 | L1 | Ensure 'Turn off shell protocol protected mode' is set to 'Disabled'"
  when:
    - w11cis_rule_18_10_29_6_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer
    name: PreXPSP2ShellProtocolBehavior
    data: 0
    type: dword
    state: present
