---
- name: "18.10.66.1 | L2 | Ensure 'Disable all apps from Microsoft Store' is set to 'Disabled'"
  when:
    - w11cis_rule_18_10_66_1_enabled
    - w11cis_rule_18_10_66_1_force or _w11cis_level2
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\WindowsStore
    name: DisableStoreApps
    data: 1
    type: dword
    state: present

- name: "18.10.66.2 | L1 | Ensure 'Turn off Automatic Download and Install of updates' is set to 'Disabled'"
  when:
    - w11cis_rule_18_10_66_2_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\WindowsStore
    name: AutoDownload
    data: 4
    type: dword
    state: present

- name: "18.10.66.3 | L1 | Ensure 'Turn off the offer to update to the latest version of Windows' is set to 'Enabled'"
  when:
    - w11cis_rule_18_10_66_3_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\WindowsStore
    name: DisableOSUpgrade
    data: 1
    type: dword
    state: present

- name: "18.10.66.4 | L2 | Ensure 'Turn off the Store application' is set to 'Enabled'"
  when:
    - w11cis_rule_18_10_66_4_enabled
    - w11cis_rule_18_10_66_4_force or _w11cis_level2
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\WindowsStore
    name: RemoveWindowsStore
    data: 1
    type: dword
    state: present
