---
- name: >-
    18.10.10.1.1 | BL |
    Ensure 'Allow access to BitLocker-protected fixed data drives from earlier versions of Windows' is set to 'Disabled'
  when:
    - w11cis_rule_18_10_10_1_1_enabled
    - w11cis_rule_18_10_10_1_1_force or w11cis_bitlocker
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\FVE
    name: FDVDiscoveryVolumeType
    data: ''
    type: string
    state: present

- name: >-
    18.10.10.1.2 | BL | Ensure 'Choose how BitLocker-protected fixed drives can be recovered' is set to 'Enabled'
  when:
    - w11cis_rule_18_10_10_1_2_enabled
    - w11cis_rule_18_10_10_1_2_force or w11cis_bitlocker
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\FVE
    name: FDVRecovery
    data: 1
    type: dword
    state: present

- name: >-
    18.10.10.1.3 | BL |
    Ensure 'Choose how BitLocker-protected fixed drives can be recovered: Allow data recovery agent'
    is set to 'Enabled: True'
  when:
    - w11cis_rule_18_10_10_1_3_enabled
    - w11cis_rule_18_10_10_1_3_force or w11cis_bitlocker
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\FVE
    name: FDVManageDRA
    data: 1
    type: dword
    state: present

- name: >-
    18.10.10.1.4 | BL |
    Ensure 'Choose how BitLocker-protected fixed drives can be recovered: Recovery Password'
    is set to 'Enabled: Allow 48-digit recovery password' or higher
  when:
    - w11cis_rule_18_10_10_1_4_enabled
    - w11cis_rule_18_10_10_1_4_force or w11cis_bitlocker
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\FVE
    name: FDVRecoveryPassword
    data: "{{ _w11cis_fixed_drive_recovery_password_value }}"
    type: dword
    state: present

- name: >-
    18.10.10.1.5 | BL |
    Ensure 'Choose how BitLocker-protected fixed drives can be recovered: Recovery Key'
    is set to 'Enabled: Allow 256-bit recovery key' or higher
  when:
    - w11cis_rule_18_10_10_1_5_enabled
    - w11cis_rule_18_10_10_1_5_force or w11cis_bitlocker
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\FVE
    name: FDVRecoveryKey
    data: "{{ _w11cis_fixed_drive_recovery_key_value }}"
    type: dword
    state: present

- name: >-
    18.10.10.1.6 | BL |
    Ensure 'Choose how BitLocker-protected fixed drives can be recovered: Omit recovery options from the BitLocker setup
    wizard' is set to 'Enabled: True'
  when:
    - w11cis_rule_18_10_10_1_6_enabled
    - w11cis_rule_18_10_10_1_6_force or w11cis_bitlocker
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\FVE
    name: FDVHideRecoveryPage
    data: 1
    type: dword
    state: present

- name: >-
    18.10.10.1.7 | BL |
    Ensure 'Choose how BitLocker-protected fixed drives can be recovered: Save BitLocker recovery information to AD DS
    for fixed data drives' is set to 'Enabled: False'
  when:
    - w11cis_rule_18_10_10_1_7_enabled
    - w11cis_rule_18_10_10_1_7_force or w11cis_bitlocker
