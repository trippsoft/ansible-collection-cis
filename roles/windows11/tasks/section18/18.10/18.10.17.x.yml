---
- name: "18.10.17.1 | L1 | Ensure 'Download Mode' is NOT set to 'Enabled: Internet'"
  when:
    - w11cis_rule_18_10_17_1_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\DeliveryOptimization
    name: DODownloadMode
    data: "{{ _w11cis_delivery_optimization_download_mode_value }}"
    type: dword
    state: present
