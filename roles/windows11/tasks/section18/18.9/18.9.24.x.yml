---
- name: >-
    18.9.24.1 | BL |
    Ensure 'Enumeration policy for external devices incompatible with Kernel DMA Protection'
    is set to 'Enabled: Block All'
  when:
    - w11cis_rule_18_9_24_1_enabled
    - w11cis_rule_18_9_24_1_force or w11cis_bitlocker
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Kernel DMA Protection
    name: DeviceEnumerationPolicy
    data: 0
    type: dword
    state: present
