---
- name: >-
    18.9.41.1 | L1 |
    Ensure 'Configure SAM change password RPC methods policy' is set to 'Enabled: Block all change password RPC methods'
  when:
    - w11cis_rule_18_9_41_1_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System\SAM
    name: SamrChangeUserPasswordApiPolicy
    data: 1
    type: dword
    state: present
