---
- name: "17.2.1 | L1 | Ensure 'Audit Application Group Management' is set to 'Success and Failure'"
  when:
    - w11cis_rule_17_2_1_enabled
  block:
    - name: "17.2.1 | L1 | Ensure 'Audit Application Group Management' is set to 'Success and Failure' | Get status"
      check_mode: false
      ansible.windows.win_shell: >-
        AuditPol /get /subcategory:"{0cce9239-69ae-11d9-bed3-505054503030}" -r |
          ConvertFrom-Csv |
          Select-Object -expand "Inclusion Setting"
      changed_when: false
      failed_when: false
      register: _w11cis_rule_17_2_1_audit

    - name: "17.2.1 | L1 | Ensure 'Audit Application Group Management' is set to 'Success and Failure' | Success"
      when:
        - ("Success" not in _w11cis_rule_17_2_1_audit.stdout)
      ansible.windows.win_shell: AuditPol /set /subcategory:"{0cce9239-69ae-11d9-bed3-505054503030}" /success:enable
      changed_when: true

    - name: "17.2.1 | L1 | Ensure 'Audit Application Group Management' is set to 'Success and Failure' | Failure"
      when:
        - ("Failure" not in _w11cis_rule_17_2_1_audit.stdout)
      ansible.windows.win_shell: AuditPol /set /subcategory:"{0cce9239-69ae-11d9-bed3-505054503030}" /failure:enable
      changed_when: true

- name: "17.2.2 | L1 | Ensure 'Audit Security Group Management' is set to include 'Success'"
