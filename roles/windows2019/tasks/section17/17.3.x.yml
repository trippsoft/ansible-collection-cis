---
- name: "17.3.1 | L1 | Ensure 'Audit PNP Activity' is set to include 'Success'"
  when:
    - w2019cis_rule_17_3_1_enabled
  block:
    - name: "17.3.1 | L1 | Ensure 'Audit PNP Activity' is set to include 'Success' | Get status"
      check_mode: false
      ansible.windows.win_shell: >-
        AuditPol /get /subcategory:"{0cce9248-69ae-11d9-bed3-505054503030}" -r |
          ConvertFrom-Csv |
          Select-Object -expand "Inclusion Setting"
      changed_when: false
      failed_when: false
      register: _w2019cis_rule_17_3_1_audit

    - name: "17.3.1 | L1 | Ensure 'Audit PNP Activity' is set to include 'Success' | Success"
      when:
        - ("Success" not in _w2019cis_rule_17_3_1_audit.stdout)
      ansible.windows.win_shell: AuditPol /set /subcategory:"{0cce9248-69ae-11d9-bed3-505054503030}" /success:enable
      changed_when: true

- name: "17.3.2 | L1 | Ensure 'Audit Process Creation' is set to include 'Success'"
  when:
    - w2019cis_rule_17_3_2_enabled
  block:
    - name: "17.3.2 | L1 | Ensure 'Audit Process Creation' is set to include 'Success' | Get status"
      check_mode: false
      ansible.windows.win_shell: >-
        AuditPol /get /subcategory:"{0cce922b-69ae-11d9-bed3-505054503030}" -r |
          ConvertFrom-Csv |
          Select-Object -expand "Inclusion Setting"
      changed_when: false
      failed_when: false
      register: _w2019cis_rule_17_3_2_audit

    - name: "17.3.2 | L1 | Ensure 'Audit Process Creation' is set to include 'Success' | Success"
      when:
        - ("Success" not in _w2019cis_rule_17_3_2_audit.stdout)
      ansible.windows.win_shell: AuditPol /set /subcategory:"{0cce922b-69ae-11d9-bed3-505054503030}" /success:enable
      changed_when: true
