---
- name: Gather distribution info
  when:
    - ansible_distribution is not defined or
      ansible_distribution_major_version is not defined or
      ansible_os_family is not defined
  ansible.builtin.setup:
    gather_subset:
      - '!all'
      - '!min'
      - distribution
      - distribution_major_version
      - os_family

- name: Get package facts
  ansible.builtin.package_facts:

- name: Gather mount facts
  ansible.builtin.setup:
    gather_subset:
      - '!all'
      - '!min'
      - mounts

- name: Set mount names
  ansible.builtin.set_fact:
    _rhel9cis_mount_names: "{{ ansible_mounts | map(attribute='mount') | list }}"

- name: Get /etc/passwd contents
  check_mode: false
  ansible.builtin.command: cat /etc/passwd
  changed_when: false
  register: _rhel9cis_passwd_file_audit

- name: Parse /etc/passwd contents to variable
  ansible.builtin.set_fact:
    _rhel9cis_passwd: >-
      {{ _rhel9cis_passwd_file_audit.stdout_lines |
          map('regex_replace', ld_passwd_regex, ld_passwd_yaml) |
          map('from_yaml') |
          list }}
  vars:
    ld_passwd_regex: >-
      ^(?P<id>[^:]*):(?P<password>[^:]*):(?P<uid>[^:]*):(?P<gid>[^:]*):(?P<gecos>[^:]*):(?P<dir>[^:]*):(?P<shell>[^:]*)
    ld_passwd_yaml: |
      id: >-4
          \g<id>
      password: >-4
          \g<password>
      uid: \g<uid>
      gid: \g<gid>
      gecos: >-4
          \g<gecos>
      dir: >-4
          \g<dir>
      shell: >-4
          \g<shell>

- name: Get /etc/group contents
  check_mode: false
  ansible.builtin.command: cat /etc/group
  changed_when: false
  register: _rhel9cis_group_file_audit

- name: Parse /etc/group contents to variable
  ansible.builtin.set_fact:
    _rhel9cis_group: >-
      {{ _rhel9cis_group_file_audit.stdout_lines |
          map('regex_replace', ld_group_regex, ld_group_yaml) |
          map('from_yaml') | list }}
  vars:
    ld_group_regex: >-
      ^(?P<id>[^:]*):(?P<password>[^:]*):(?P<gid>[^:]*):(?P<members>[^:]*)
    ld_group_yaml: |
      id: >-4
          \g<id>
      password: >-4
          \g<password>
      gid: \g<gid>
      members: >-4
          \g<members>

- name: Validate OS version and family
  ansible.builtin.assert:
    that:
      - ansible_os_family == 'RedHat' or ansible_os_family == 'Rocky'
      - ansible_distribution_major_version is version_compare('9', '==')
    fail_msg: >-
      This role can only be run against supported Linux distributions.
      {{ ansible_distribution }} {{ ansible_distribution_major_version }} is not supported.
    success_msg: >-
      This role is running against {{ ansible_distribution }} {{ ansible_distribution_major_version }}.

