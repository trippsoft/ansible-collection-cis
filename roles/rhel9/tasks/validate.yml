  when:
    - rhel9cis_rule_1_1_2_1_2_enabled
  ansible.builtin.assert:
    that:
      - '"nodev" in rhel9cis_tmp_mount_opts'
    fail_msg: >-
      The variable 'rhel9cis_tmp_mount_opts' must contain 'nodev'. Value: {{ rhel9cis_tmp_mount_opts | join(', ') }}
