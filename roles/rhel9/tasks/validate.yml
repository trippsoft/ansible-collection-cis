  ansible.builtin.assert:
    that:
      - rhel9cis_selinux_mode == 'enforcing'
    fail_msg: >-
      The 'rhel9cis_selinux_mode' must be set to 'enforcing'. Value: {{ rhel9cis_selinux_mode }}
    success_msg: The 'rhel9cis_selinux_mode' is set to 'enforcing'.

- name: Validate | 1.6.1 | Ensure system wide crypto policy is not set to legacy
  when:
    - rhel9cis_rule_1_6_1_enabled
  ansible.builtin.assert:
    that:
      - rhel9cis_crypto_policy != 'LEGACY'
    fail_msg: "The 'rhel9cis_crypto_policy' cannot be 'LEGACY'. Value: {{ rhel9cis_crypto_policy }}"
    success_msg: "The 'rhel9cis_crypto_policy' is not set to 'LEGACY'. Value: {{ rhel9cis_crypto_policy }}"

