- name: Validate | 5.1.9 | Ensure sshd ClientAliveInterval and ClientAliveCountMax are configured
  when:
    - rhel9cis_rule_5_1_9_enabled
  block:
    - name: >-
        Validate | 5.1.9 | Ensure sshd ClientAliveInterval and ClientAliveCountMax are configured | ClientAliveInterval
      ansible.builtin.assert:
        that:
          - rhel9cis_sshd_client_alive_interval | int > 0
        fail_msg: >-
          The 'rhel9cis_sshd_client_alive_interval' variable must be set to 1 or more.
          Value: {{ rhel9cis_sshd_client_alive_interval }}
        success_msg: >-
          The 'rhel9cis_sshd_client_alive_interval' variable is set to 1 or more.
          Value: {{ rhel9cis_sshd_client_alive_interval }}

    - name: >-
        Validate | 5.1.9 | Ensure sshd ClientAliveInterval and ClientAliveCountMax are configured | ClientAliveCountMax
      ansible.builtin.assert:
        that:
          - rhel9cis_sshd_client_alive_count_max | int > 0
        fail_msg: >-
          The 'rhel9cis_sshd_client_alive_count_max' variable must be set to 1 or more.
          Value: {{ rhel9cis_sshd_client_alive_count_max }}
        success_msg: >-
