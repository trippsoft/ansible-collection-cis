---
- name: "18.9.29.1 | L1 | Ensure 'Block user from showing account details on sign-in' is set to 'Enabled'"
  when:
    - w2025cis_rule_18_9_29_1_enabled
  ansible.windows.win_regedit:
    path: HKLM:\Software\Policies\Microsoft\Windows\System
    name: BlockUserFromShowingAccountDetailsOnSignin
    data: 1
    type: dword
    state: present

- name: "18.9.29.2 | L1 | Ensure 'Do not display network selection UI' is set to 'Enabled'"
  when:
    - w2025cis_rule_18_9_29_2_enabled
  ansible.windows.win_regedit:
    path: HKLM:\Software\Policies\Microsoft\Windows\System
    name: DontDisplayNetworkSelectionUI
    data: 1
    type: dword
    state: present

- name: "18.9.29.3 | L1 | Ensure 'Do not enumerate connected users on domain-joined computers' is set to 'Enabled'"
  when:
    - w2025cis_rule_18_9_29_3_enabled
  ansible.windows.win_regedit:
    path: HKLM:\Software\Policies\Microsoft\Windows\System
    name: DontEnumerateConnectedUsers
    data: 1
    type: dword
    state: present

- name: "18.9.29.4 | L1 | Ensure 'Enumerate local users on domain-joined computers' is set to 'Disabled' | MS only"
  when:
    - w2025cis_rule_18_9_29_4_enabled
    - _w2025cis_member_server
  ansible.windows.win_regedit:
    path: HKLM:\Software\Policies\Microsoft\Windows\System
    name: EnumerateLocalUsers
    data: 0
    type: dword
    state: present

- name: "18.9.29.5 | L1 | Ensure 'Turn off app notifications on the lock screen' is set to 'Enabled'"
  when:
    - w2025cis_rule_18_9_29_5_enabled
  ansible.windows.win_regedit:
    path: HKLM:\Software\Policies\Microsoft\Windows\System
    name: DisableLockScreenAppNotifications
    data: 1
    type: dword
    state: present

- name: "18.9.29.6 | L1 | Ensure 'Turn on convenience PIN sign-in' is set to 'Disabled'"
  when:
    - w2025cis_rule_18_9_29_6_enabled
  ansible.windows.win_regedit:
    path: HKLM:\Software\Policies\Microsoft\Windows\System
    name: AllowDomainPINLogon
    data: 0
    type: dword
    state: present
