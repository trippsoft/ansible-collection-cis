---
- name: "18.9.37.1 | L1 | Ensure 'Configure Offer Remote Assistance' is set to 'Disabled'"
  when:
    - w2025cis_rule_18_9_37_1_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services
    name: fAllowUnsolicited
    data: 0
    type: dword
    state: present

- name: "18.9.37.2 | L1 | Ensure 'Configure Solicited Remote Assistance' is set to 'Disabled'"
  when:
    - w2025cis_rule_18_9_37_2_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services
    name: fAllowToGetHelp
    data: 0
    type: dword
    state: present
