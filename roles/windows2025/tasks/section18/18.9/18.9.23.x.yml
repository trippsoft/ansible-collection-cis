---
- name: "18.9.23.1 | L2 | Ensure 'Support device authentication using certificate' is set to 'Enabled: Automatic'"
  when:
    - w2025cis_rule_18_9_23_1_enabled
    - w2025cis_rule_18_9_23_1_force or _w2025cis_level2
  block:
    - name: >-
        18.9.23.1 | L2 |
        Ensure 'Support device authentication using certificate' is set to 'Enabled: Automatic' |
        DevicePKInitBehavior
      ansible.windows.win_regedit:
        path: HKLM:\Software\Microsoft\Windows\CurrentVersion\Policies\System\kerberos\parameters
        name: DevicePKInitBehavior
        data: 0
        type: dword
        state: present

    - name: >-
        18.9.23.1 | L2 |
        Ensure 'Support device authentication using certificate' is set to 'Enabled: Automatic' |
        DevicePKInitEnabled
      ansible.windows.win_regedit:
        path: HKLM:\Software\Microsoft\Windows\CurrentVersion\Policies\System\kerberos\parameters
        name: DevicePKInitEnabled
        data: 1
        type: dword
        state: present
