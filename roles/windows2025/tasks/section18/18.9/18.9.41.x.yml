---
- name: >-
    18.9.41.1 | L1 |
    Ensure 'Configure validation of ROCA-vulnerable WHfB keys during authentication' is set to 'Enabled: Block' |
    DC only
  when:
    - w2025cis_rule_18_9_41_1_enabled
    - _w2025cis_domain_controller
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System\SAM
    name: SamNGCKeyROCAValidation
    data: 2
    type: dword
    state: present

- name: >-
    18.9.41.2 | L1 |
    Ensure 'Configure SAM change password RPC methods policy'
    is set to 'Enabled: Allow strong encryption change password RPC method only' |
    DC only
  when:
    - w2025cis_rule_18_9_41_2_enabled
    - _w2025cis_domain_controller
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System\SAM
    name: SamrChangeUserPasswordApiPolicy
    data: 2
    type: dword
    state: present

- name: >-
    18.9.41.3 | L1 |
    Ensure 'Configure SAM change password RPC methods policy'
    is set to 'Enabled: Block all change password RPC methods' |
    MS only
  when:
    - w2025cis_rule_18_9_41_3_enabled
    - _w2025cis_member_server
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System\SAM
    name: SamrChangeUserPasswordApiPolicy
    data: 1
    type: dword
    state: present
