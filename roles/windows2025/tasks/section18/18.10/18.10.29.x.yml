---
- name: >-
    18.10.29.2 | L1 |
    Ensure 'Do not apply the Mark of the Web tag to files copied from insecure sources' is set to 'Disabled'
  when:
    - w2025cis_rule_18_10_29_2_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Explorer
    name: DisableMotWOnInsecurePathCopy
    data: 0
    type: dword
    state: present

- name: "18.10.29.3 | L1 | Ensure 'Turn off Data Execution Prevention for Explorer' is set to 'Disabled'"
  when:
    - w2025cis_rule_18_10_29_3_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Explorer
    name: NoDataExecutionPrevention
    data: 0
    type: dword
    state: present

- name: "18.10.29.4 | L1 | Ensure 'Turn off heap termination on corruption' is set to 'Disabled'"
  when:
    - w2025cis_rule_18_10_29_4_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Explorer
    name: NoHeapTerminationOnCorruption
    data: 0
    type: dword
    state: present

- name: "18.10.29.5 | L1 | Ensure 'Turn off shell protocol protected mode' is set to 'Disabled'"
  when:
    - w2025cis_rule_18_10_29_5_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer
    name: PreXPSP2ShellProtocolBehavior
    data: 0
    type: dword
    state: present
