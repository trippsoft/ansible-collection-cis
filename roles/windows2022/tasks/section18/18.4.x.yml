---
- name: >-
    18.4.1 | L1 | Ensure 'Apply UAC restrictions to local accounts on network logons' is set to 'Enabled' | MS only
  when:
    - w2022cis_rule_18_4_1_enabled
    - _w2022cis_standalone_or_member_server
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System
    name: LocalAccountTokenFilterPolicy
    data: 0
    type: dword
    state: present

- name: "18.4.2 | L1 | Ensure 'Configure SMB v1 client driver' is set to 'Enabled: Disable driver (recommended)'"
  when:
    - w2022cis_rule_18_4_2_enabled
  ansible.windows.win_service:
    name: mrxsmb10
    start_mode: disabled
  register: _w2022cis_smbv1_client_driver
  failed_when:
    - _w2022cis_smbv1_client_driver is failed
    - ("is not installed" not in _w2022cis_smbv1_client_driver.msg)

- name: "18.4.3 | L1 | Ensure 'Configure SMB v1 server' is set to 'Disabled'"
  when:
    - w2022cis_rule_18_4_3_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\LanManServer\Parameters
    name: SMB1
    data: 0
    type: dword
    state: present
  notify:
    - _w2022cis_reboot_windows

- name: "18.4.4 | L1 | Ensure 'Enable Certificate Padding' is set to 'Enabled'"
  when:
    - w2022cis_rule_18_4_4_enabled
  block:
    - name: "18.4.4 | L1 | Ensure 'Enable Certificate Padding' is set to 'Enabled' | 64-bit"
      ansible.windows.win_regedit:
        path: HKLM:\SOFTWARE\Microsoft\Cryptography\Wintrust\Config
        name: EnableCertPaddingCheck
        data: 1
        type: dword
        state: present

    - name: "18.4.4 | L1 | Ensure 'Enable Certificate Padding' is set to 'Enabled' | 32-bit"
      ansible.windows.win_regedit:
        path: HKLM:\SOFTWARE\Wow6432Node\Microsoft\Cryptography\Wintrust\Config
        name: EnableCertPaddingCheck
        data: 1
        type: dword
        state: present

- name: "18.4.5 | L1 | Ensure 'Enable Structured Exception Handling Overwrite Protection (SEHOP)' is set to 'Enabled'"
  when:
    - w2022cis_rule_18_4_5_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Control\Session Manager\Kernel
    name: DisableExceptionChainValidation
    data: 0
    type: dword
    state: present

- name: "18.4.6 | L1 | Ensure 'NetBT NodeType configuration' is set to 'Enabled: P-node (recommended)'"
  when:
    - w2022cis_rule_18_4_6_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\NetBT\Parameters
    name: NodeType
    data: 2
    type: dword
    state: present
