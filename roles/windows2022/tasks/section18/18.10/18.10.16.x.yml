---
- name: >-
    18.10.16.1 | L1 |
    Ensure 'Allow Diagnostic Data'
    is set to 'Enabled: Diagnostic data off (not recommended)' or 'Enabled: Send required diagnostic data'
  when:
    - w2022cis_rule_18_10_16_1_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\DataCollection
    name: AllowTelemetry
    data: "{{ _w2022cis_telemetry_level_value }}"
    type: dword
    state: present

- name: >-
    18.10.16.2 | L2 |
    Ensure 'Configure Authenticated Proxy usage for the Connected User Experience and Telemetry service'
    is set to 'Enabled: Disable Authenticated Proxy usage'
  when:
    - w2022cis_rule_18_10_16_2_enabled
    - w2022cis_rule_18_10_16_2_force or _w2022cis_level2
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\DataCollection
    name: DisableEnterpriseAuthProxy
    data: 1
    type: dword
    state: present

- name: "18.10.16.3 | L1 | Ensure 'Do not show feedback notifications' is set to 'Enabled'"
  when:
    - w2022cis_rule_18_10_16_3_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\DataCollection
    name: DoNotShowFeedbackNotifications
    data: 1
    type: dword
    state: present

- name: "18.10.16.4 | L2 | Ensure 'Enable OneSettings Auditing' is set to 'Enabled'"
  when:
    - w2022cis_rule_18_10_16_4_enabled
    - w2022cis_rule_18_10_16_4_force or _w2022cis_level2
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\DataCollection
    name: EnableOneSettingsAuditing
    data: 1
    type: dword
    state: present

- name: "18.10.16.5 | L2 | Ensure 'Limit Diagnostic Log Collection' is set to 'Enabled'"
  when:
    - w2022cis_rule_18_10_16_5_enabled
    - w2022cis_rule_18_10_16_5_force or _w2022cis_level2
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\DataCollection
    name: LimitDiagnosticLogCollection
    data: 1
    type: dword
    state: present

- name: "18.10.16.6 | L2 | Ensure 'Limit Dump Collection' is set to 'Enabled'"
  when:
    - w2022cis_rule_18_10_16_6_enabled
    - w2022cis_rule_18_10_16_6_force or _w2022cis_level2
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\DataCollection
    name: LimitDumpCollection
    data: 1
    type: dword
    state: present
