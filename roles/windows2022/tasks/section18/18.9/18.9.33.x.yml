---
- name: "18.9.33.1 | L2 | Ensure 'Allow Clipboard synchronization across devices' is set to 'Disabled'"
  when:
    - w2022cis_rule_18_9_33_1_enabled
    - w2022cis_rule_18_9_33_1_force or _w2022cis_level2
  ansible.windows.win_regedit:
    path: HKLM:\Software\Policies\Microsoft\Windows\System
    name: AllowCrossDeviceClipboard
    data: 0
    type: dword
    state: present

- name: "18.9.33.2 | L2 | Ensure 'Allow upload of User Activities' is set to 'Disabled'"
  when:
    - w2022cis_rule_18_9_33_2_enabled
    - w2022cis_rule_18_9_33_2_force or _w2022cis_level2
  ansible.windows.win_regedit:
    path: HKLM:\Software\Policies\Microsoft\Windows\System
    name: UploadUserActivities
    data: 0
    type: dword
    state: present
