---
- name: "2.3.8.1 | L1 | Ensure 'Microsoft network client: Digitally sign communications (always)' is set to 'Enabled'"
  when:
    - w2022cis_rule_2_3_8_1_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\LanmanWorkstation\Parameters
    name: RequireSecuritySignature
    data: 1
    type: dword
    state: present

- name: >-
    2.3.8.2 | L1 |
    Ensure 'Microsoft network client: Send unencrypted password to third-party SMB servers' is set to 'Disabled'
  when:
    - w2022cis_rule_2_3_8_2_enabled
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\LanmanWorkstation\Parameters
    name: EnablePlainTextPassword
    data: 0
    type: dword
    state: present
