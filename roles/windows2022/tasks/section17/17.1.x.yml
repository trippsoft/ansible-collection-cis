- name: "17.1.3 | L1 | Ensure 'Audit Kerberos Service Ticket Operations' is set to 'Success and Failure' | DC only"
  when:
    - w2022cis_rule_17_1_3_enabled
    - _w2022cis_domain_controller
  block:
    - name: >-
        17.1.3 | L1 |
        Ensure 'Audit Kerberos Service Ticket Operations' is set to 'Success and Failure' |
        DC only |
        Get status
      check_mode: false
      ansible.windows.win_shell: >-
        AuditPol /get /subcategory:"{0cce9240-69ae-11d9-bed3-505054503030}" -r |
          ConvertFrom-Csv |
          Select-Object -expand "Inclusion Setting"
      changed_when: false
      failed_when: false
      register: _w2022cis_rule_17_1_3_audit

    - name: >-
        17.1.3 | L1 |
        Ensure 'Audit Kerberos Service Ticket Operations' is set to 'Success and Failure' |
        DC only |
        Success
      when:
        - ("Success" not in _w2022cis_rule_17_1_3_audit.stdout)
      ansible.windows.win_shell: AuditPol /set /subcategory:"{0cce9240-69ae-11d9-bed3-505054503030}" /success:enable
