---
name: Molecule - windows2019 role
'on':
  workflow_call: {}
  workflow_dispatch: {}
  pull_request:
    branches:
      - main
    paths:
      - galaxy.yml
      - roles/windows2019/**
      - '!roles/windows2019/.aar_doc.yml'
      - '!roles/windows2019/README.md'
      - '!roles/windows2019/meta/argument_specs.yml'
      - '!roles/windows2019/meta/main.yml'
  push:
    branches:
      - main
    paths:
      - galaxy.yml
      - roles/windows2019/**
      - '!roles/windows2019/.aar_doc.yml'
      - '!roles/windows2019/README.md'
      - '!roles/windows2019/meta/argument_specs.yml'
      - '!roles/windows2019/meta/main.yml'
defaults:
  run:
    working-directory: 'trippsc2.cis'
jobs:
  molecule:
    name: Run Molecule tests
    runs-on:
      - self-hosted
      - linux
      - ansible
      - x64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: 'trippsc2.cis'
      - name: Run Molecule tests
        run: |
          source ~/venv/ansible-2.16/bin/activate
          rm -rf ~/.ansible/collections/ansible_collections/*
          cd ./roles/windows2019
          molecule test
          rm -rf ~/.ansible/collections/ansible_collections/*
          deactivate
        env:
          ANSIBLE_FORCE_COLOR: '1'
          PY_COLORS: '1'
